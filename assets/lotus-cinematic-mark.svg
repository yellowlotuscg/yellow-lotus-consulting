<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 360" role="img" aria-labelledby="title desc">
  <title id="title">Yellow Lotus Consulting Group mark</title>
  <desc id="desc">A smooth golden lotus with a refined arc and flowing base strokes.</desc>
  <defs>
