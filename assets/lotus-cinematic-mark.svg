<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Yellow Lotus mark">
  <defs>
    <linearGradient id="ylg-main" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe7a3"/>
      <stop offset="0.55" stop-color="#e0ad44"/>
      <stop offset="1" stop-color="#a9781d"/>
    </linearGradient>
    <linearGradient id="ylg-inner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff5d2"/>
      <stop offset="0.6" stop-color="#f0c75f"/>
      <stop offset="1" stop-color="#c89328"/>
    </linearGradient>
  </defs>

  <!-- petals fan from a shared base, drawn back to front for a layered bloom -->
  <g transform="translate(256 350)">
    <g fill="url(#ylg-main)">
      <path d="M0 0 C -36 -64 -32 -156 0 -200 C 32 -156 36 -64 0 0 Z" transform="rotate(-66)"/>
      <path d="M0 0 C -36 -64 -32 -156 0 -200 C 32 -156 36 -64 0 0 Z" transform="rotate(66)"/>
      <path d="M0 0 C -36 -64 -32 -156 0 -200 C 32 -156 36 -64 0 0 Z" transform="rotate(-44)"/>
      <path d="M0 0 C -36 -64 -32 -156 0 -200 C 32 -156 36 -64 0 0 Z" transform="rotate(44)"/>
      <path d="M0 0 C -36 -64 -32 -156 0 -200 C 32 -156 36 -64 0 0 Z" transform="rotate(-22)"/>
      <path d="M0 0 C -36 -64 -32 -156 0 -200 C 32 -156 36 -64 0 0 Z" transform="rotate(22)"/>
      <path d="M0 0 C -36 -64 -32 -156 0 -200 C 32 -156 36 -64 0 0 Z" transform="rotate(0)"/>
    </g>
    <g fill="url(#ylg-inner)">
      <path d="M0 0 C -23 -42 -20 -100 0 -128 C 20 -100 23 -42 0 0 Z" transform="rotate(-26)"/>
      <path d="M0 0 C -23 -42 -20 -100 0 -128 C 20 -100 23 -42 0 0 Z" transform="rotate(26)"/>
      <path d="M0 0 C -23 -42 -20 -100 0 -128 C 20 -100 23 -42 0 0 Z" transform="rotate(0)"/>
    </g>
    <path d="M0 10 C -13 -10 -11 -46 0 -66 C 11 -46 13 -10 0 10 Z" fill="url(#ylg-inner)"/>
  </g>
</svg>
