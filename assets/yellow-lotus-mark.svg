<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" role="img" aria-labelledby="title desc">
  <title id="title">Yellow Lotus Consulting Group mark</title>
  <desc id="desc">A gold lotus integrated with secure network nodes on a dark field.</desc>
  <defs>
    <radialGradient id="aura" cx="50%" cy="42%" r="62%">
      <stop offset="0" stop-color="#f4d889" stop-opacity=".28"/>
      <stop offset=".58" stop-color="#d7aa43" stop-opacity=".08"/>
      <stop offset="1" stop-color="#050706" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="32" x2="124" y1="22" y2="136" gradientUnits="userSpaceOnUse">
